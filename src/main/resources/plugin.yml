name: TeamForge
version: '${version}'
main: de.teamforge.TeamForgePlugin
api-version: '1.21'
author: TeamForge
description: Comprehensive team plugin with GUIs, alliances, bank, team home and more.
website: https://github.com/
softdepend: [Vault, PlaceholderAPI, ProtocolLib, AdvancedTeleport]

commands:
  team:
    description: Main command of the team plugin
    usage: /team [command]
    aliases: [t, teams, tf]
  teamadmin:
    description: Admin commands of the team plugin
    usage: /teamadmin [command]
    aliases: [ta]
    permission: teams.admin

permissions:
  teams.use:
    description: Allows the use of /team
    default: true
  teams.create:
    description: Allows creating teams
    default: true
  teams.admin:
    description: Access to /teamadmin (reload, disband, forcejoin, forcekick, spy)
    default: op
  teams.chat.spy:
    description: See team and ally chat of all teams (spy mode)
    default: op
