name: ATAddon
version: 1.0.0
main: de.server.atconfirm.ATAddon
api-version: '1.21'
author: ServerOwner
description: Adds confirmation GUIs, a homes GUI and a warmup countdown for AdvancedTeleport.
load: STARTUP

softdepend:
  - AdvancedTeleport
  - CombatLogX

# Only our OWN commands are declared here. The AdvancedTeleport commands
# (tpa, tpahere, tpaccept, rtp, homes, home, spawn, back) are intercepted at
# runtime instead, so they keep AT's own tab-completion and don't show up twice.
commands:
  tpauto:
    description: Toggle auto-accept for incoming teleport requests.
    usage: /tpauto
  tpsettings:
    description: Open the teleport settings GUI.
    usage: /tpsettings
    aliases: [settings]
  menu:
    description: Open the teleport menu.
    usage: /menu
    aliases: [tpmenu]
  rtplock:
    description: Lock or unlock /rtp for all players (ops only).
    usage: /rtplock
    permission: ataddon.rtplock
  backlock:
    description: Lock or unlock /back for all players (ops only).
    usage: /backlock
    permission: ataddon.backlock
  warps:
    description: Open the warps GUI.
    usage: /warps
  warplock:
    description: Lock or unlock /warp for all players (ops only).
    usage: /warplock
    permission: ataddon.warplock
  spawnlock:
    description: Lock or unlock /spawn for all players (ops only).
    usage: /spawnlock
    permission: ataddon.spawnlock
  tpas:
    description: Show your incoming teleport requests in a GUI.
    usage: /tpas
  ataddon:
    description: ATAddon admin command.
    usage: /ataddon reload
    permission: ataddon.reload

permissions:
  ataddon.rtplock:
    description: Allows locking/unlocking RTP and bypassing the RTP lock.
    default: op
  ataddon.backlock:
    description: Allows locking/unlocking /back and bypassing the back lock.
    default: op
  ataddon.warplock:
    description: Allows locking/unlocking /warp and bypassing the warp lock.
    default: op
  ataddon.spawnlock:
    description: Allows locking/unlocking /spawn and bypassing the spawn lock.
    default: op
  ataddon.reload:
    description: Allows using /ataddon reload.
    default: op
