prefix: "<gradient:#36d1dc:#5b86e5><bold>TeamForge</bold></gradient> <dark_gray>»</dark_gray> "

word:
  "on": "<green>on</green>"
  "off": "<red>off</red>"
  none: "<gray>none</gray>"
  online: "<green>online</green>"
  offline: "<gray>offline</gray>"

role:
  owner: "<gold>Owner</gold>"
  officer: "<yellow>Officer</yellow>"
  member: "<gray>Member</gray>"

input:
  cancel-word: "cancel"
  cancel-hint: "<gray>Type <white>cancel</white> to abort.</gray>"
  cancelled: "<red>Input cancelled.</red>"
  create-name: "<aqua>Type your team's name in chat:</aqua>"
  create-tag: "<aqua>Type the tag (or <white>-</white> for automatic):</aqua>"
  rename: "<aqua>Type the new team name in chat:</aqua>"
  tag: "<aqua>Type the new tag in chat:</aqua>"
  desc: "<aqua>Type the new description in chat:</aqua>"
  bank-amount: "<aqua>Type an amount in chat:</aqua>"

error:
  player-only: "<red>This command is for players only.</red>"
  no-permission: "<red>You don't have permission to do that.</red>"
  unknown-command: "<red>Unknown command. Use <white>/team help</white>.</red>"
  not-in-team: "<red>You are not in a team.</red>"
  already-in-team: "<red>You are already in a team.</red>"
  team-not-found: "<red>Team not found.</red>"
  player-not-found: "<red>Player not found.</red>"
  not-owner: "<red>Only the owner can do that.</red>"
  invalid-number: "<red>Invalid number.</red>"

create:
  usage: "<gray>Usage: <white>/team create <name> [tag]</white></gray>"
  success: "<green>Team <team> has been created!</green>"
  broadcast: "<gray><player> founded the team <team><gray>.</gray>"
  name-invalid-length: "<red>The name has an invalid length.</red>"
  name-invalid-chars: "<red>The name contains invalid characters.</red>"
  name-blocked: "<red>That name is not allowed.</red>"
  name-taken: "<red>That name is already taken.</red>"
  tag-invalid-length: "<red>The tag has an invalid length.</red>"
  tag-invalid-chars: "<red>The tag contains invalid characters.</red>"
  tag-taken: "<red>That tag is already taken.</red>"

disband:
  confirm-needed: "<red>Confirm with <white>/team disband confirm</white>.</red>"
  success: "<green>Your team has been disbanded.</green>"
  broadcast: "<gray>The team <team> <gray>was disbanded by <player>.</gray>"

invite:
  usage: "<gray>Usage: <white>/team invite <player></white></gray>"
  sent: "<green><target> has been invited.</green>"
  received: "<aqua>You were invited to <team><aqua>! <white>/team join <team_name></white></aqua>"
  already-invited: "<red>That player has already been invited.</red>"
  target-already-team: "<red>That player is already in a team.</red>"
  team-full: "<red>Your team is full.</red>"
  revoked: "<yellow>Invitation for <target> revoked.</yellow>"
  none: "<red>There is no invitation for that player.</red>"
  pending-on-join: "<aqua>You have pending team invitations! Open <white>/team invites</white>.</aqua>"

join:
  usage: "<gray>Usage: <white>/team join <name></white></gray>"
  success: "<green>You joined <team><green>!</green>"
  broadcast: "<gray><player> joined the team.</gray>"
  no-invite: "<red>You don't have an invitation for this team.</red>"
  full: "<red>This team is full.</red>"

deny:
  success: "<yellow>Invitation declined.</yellow>"

leave:
  success: "<yellow>You left your team.</yellow>"
  broadcast: "<gray><player> left the team.</gray>"
  owner-must-transfer: "<red>Transfer ownership first or disband the team.</red>"

kick:
  usage: "<gray>Usage: <white>/team kick <player></white></gray>"
  success: "<green><target> has been kicked.</green>"
  target: "<red>You were removed from the team.</red>"
  broadcast: "<gray><target> was removed from the team.</gray>"
  cannot: "<red>You can't kick that player.</red>"

promote:
  usage: "<gray>Usage: <white>/team promote <player></white></gray>"
  success: "<green><target> is now an officer.</green>"
  already: "<red>That player is already an officer or higher.</red>"

demote:
  usage: "<gray>Usage: <white>/team demote <player></white></gray>"
  success: "<yellow><target> is now a regular member.</yellow>"
  not-officer: "<red>That player is not an officer.</red>"

transfer:
  usage: "<gray>Usage: <white>/team transfer <player></white></gray>"
  success: "<green>Ownership was transferred to <target>.</green>"
  broadcast: "<gray><target> is now the new owner.</gray>"

chat:
  disabled: "<red>This chat channel is disabled.</red>"
  toggle-on: "<green>Team chat enabled.</green>"
  toggle-off: "<yellow>Team chat disabled.</yellow>"
  ally-toggle-on: "<green>Ally chat enabled.</green>"
  ally-toggle-off: "<yellow>Ally chat disabled.</yellow>"
  team-format: "<dark_aqua>[Team]</dark_aqua> <tag> <white><player></white><gray>:</gray> <message>"
  ally-format: "<gold>[Ally]</gold> <tag> <white><player></white><gray>:</gray> <message>"
  spy-format: "<dark_gray>[Spy] <tag> <player>: <message></dark_gray>"
  public-format: "<tag> <name><gray>:</gray> <message>"

home:
  disabled: "<red>Team homes are disabled.</red>"
  world-disabled: "<red>The home is disabled in this world.</red>"
  none: "<red>Your team has no home set.</red>"
  cooldown: "<red>You must wait before teleporting again.</red>"
  teleporting: "<aqua>Teleporting... stand still.</aqua>"
  success: "<green>Welcome home!</green>"
  cancelled-move: "<red>Teleport cancelled, you moved.</red>"
  cancelled-damage: "<red>Teleport cancelled, you took damage.</red>"
  set: "<green>Team home set.</green>"
  deleted: "<yellow>Team home deleted.</yellow>"

pvp:
  enabled: "<green>Friendly fire is now on.</green>"
  disabled: "<yellow>Friendly fire is now off.</yellow>"
  locked: "<red>Friendly fire cannot be changed.</red>"

open:
  enabled: "<green>Your team is now open to everyone.</green>"
  disabled: "<yellow>Your team is now invite-only.</yellow>"
  locked: "<red>Open teams are not allowed.</red>"

rename:
  usage: "<gray>Usage: <white>/team rename <name></white></gray>"
  success: "<green>Team renamed to <team>.</green>"

tag:
  usage: "<gray>Usage: <white>/team tag <tag></white></gray>"
  success: "<green>Tag changed: <tag></green>"

desc:
  usage: "<gray>Usage: <white>/team desc <text></white></gray>"
  success: "<green>Description updated.</green>"

color:
  usage: "<gray>Usage: <white>/team color <color></white></gray>"
  success: "<green>Team color changed.</green>"
  invalid: "<red>Invalid color.</red>"
  disabled: "<red>Colors are disabled.</red>"

ally:
  usage: "<gray>Usage: <white>/team ally <team></white></gray>"
  self: "<red>You can't ally with yourself.</red>"
  already: "<red>You are already allied.</red>"
  limit: "<red>Maximum number of allies reached.</red>"
  request-sent: "<green>Alliance request sent to <team><green>.</green>"
  request-received: "<aqua><team> <aqua>wants to ally! <white>/team ally <team_name></white></aqua>"
  accepted: "<green>You are now allied with <team><green>!</green>"
  removed: "<yellow>Alliance with <team> <yellow>ended.</yellow>"

bank:
  disabled: "<red>The team bank is disabled.</red>"
  usage: "<gray>Usage: <white>/team bank <deposit|withdraw> <amount></white></gray>"
  balance: "<gold>Team balance: <white><amount></white></gold>"
  deposited: "<green>Deposited <amount>.</green>"
  withdrawn: "<green>Withdrew <amount>.</green>"
  full: "<red>The team bank is full.</red>"
  insufficient-player: "<red>You don't have enough money.</red>"
  insufficient-team: "<red>The team bank doesn't have enough money.</red>"
  no-withdraw-perm: "<red>You are not allowed to withdraw money.</red>"

combat:
  friendly-fire-blocked: "<red>You can't attack team members.</red>"
  ally-protected: "<gold>You can't attack allies.</gold>"

notifications:
  member-join: "<gray><player> is now online.</gray>"

admin:
  reloaded: "<green>Configuration reloaded.</green>"
  disbanded: "<green>Team <white><team></white> disbanded.</green>"
  forcejoin: "<green><target> was added to <white><team></white>.</green>"
  forcekick: "<green><target> was removed from the team.</green>"
  cannot-kick-owner: "<red>The owner can't be removed. Use disband.</red>"
  spy-on: "<green>Chat spy enabled.</green>"
  spy-off: "<yellow>Chat spy disabled.</yellow>"
  usage: "<gray>Admin: <white>reload | disband <team> | forcejoin <player> <team> | forcekick <player> | spy</white></gray>"

top:
  usage: "<gray>Usage: <white>/team top <members|kills|bank></white></gray>"
  header: "<gold><bold>Top Teams</bold></gold> <gray>(<type>)</gray>"
  entry: "<gray><rank>.</gray> <team> <dark_gray>-</dark_gray> <white><value></white>"

info:
  format:
    - "<dark_gray><strikethrough>                    </strikethrough></dark_gray>"
    - "<gold>Team:</gold> <team> <gray>(<tag><gray>)</gray>"
    - "<gold>Owner:</gold> <white><owner></white>"
    - "<gold>Members:</gold> <white><members>/<members_max></white> <gray>(<online> online)</gray>"
    - "<gold>Kills:</gold> <white><kills></white> <gray>|</gray> <gold>Deaths:</gold> <white><deaths></white>"
    - "<gold>Founded:</gold> <white><created></white>"
    - "<gold>Description:</gold> <gray><description></gray>"
    - "<dark_gray><strikethrough>                    </strikethrough></dark_gray>"

help:
  - "<dark_gray><strikethrough>                    </strikethrough></dark_gray>"
  - "<gradient:#36d1dc:#5b86e5><bold>TeamForge Commands</bold></gradient>"
  - "<aqua>/team</aqua> <gray>- Open the menu</gray>"
  - "<aqua>/team create <name></aqua> <gray>- Create a team</gray>"
  - "<aqua>/team invite <player></aqua> <gray>- Invite</gray>"
  - "<aqua>/team join <name></aqua> <gray>- Join</gray>"
  - "<aqua>/team leave</aqua> <gray>- Leave</gray>"
  - "<aqua>/team kick/promote/demote</aqua> <gray>- Manage members</gray>"
  - "<aqua>/team sethome | home</aqua> <gray>- Team home</gray>"
  - "<aqua>/team ally <team></aqua> <gray>- Ally</gray>"
  - "<aqua>/team bank</aqua> <gray>- Team bank</gray>"
  - "<aqua>/team chat</aqua> <gray>- Toggle team chat</gray>"
  - "<aqua>/team info | top | list</aqua> <gray>- Info</gray>"
  - "<dark_gray><strikethrough>                    </strikethrough></dark_gray>"

gui:
  common:
    back: "<red>« Back</red>"
    cancel: "<red>Cancel</red>"
    confirm: "<green>Confirm</green>"
    next: "<green>Next »</green>"
    prev: "<green>« Previous</green>"
    page: "<gray>Page <white><page></white>/<white><pages></white></gray>"
  confirm:
    title: "<dark_gray>Are you sure?</dark_gray>"
  noteam:
    title: "<dark_gray>TeamForge</dark_gray>"
    create:
      name: "<green><bold>Create Team</bold></green>"
      lore:
        - "<gray>Found your own team.</gray>"
        - "<yellow>» Click</yellow>"
    browse:
      name: "<aqua><bold>Browse Teams</bold></aqua>"
      lore:
        - "<gray>Look at all teams.</gray>"
        - "<yellow>» Click</yellow>"
    invites:
      name: "<gold><bold>Invitations</bold></gold>"
      lore:
        - "<gray>Your pending invitations.</gray>"
        - "<yellow>» Click</yellow>"
  main:
    title: "<dark_gray>Team:</dark_gray> <team>"
    info:
      name: "<gold><bold>Team Info</bold></gold>"
      lore:
        - "<gold>Tag:</gold> <tag>"
        - "<gold>Owner:</gold> <white><owner></white>"
        - "<gold>Members:</gold> <white><members>/<members_max></white> <gray>(<online> online)</gray>"
        - "<gold>Bank:</gold> <white><bank></white>"
        - "<gold>Kills/Deaths:</gold> <white><kills></white><gray>/</gray><white><deaths></white>"
        - "<gold>Friendly Fire:</gold> <ff>"
        - "<gold>Open:</gold> <open>"
        - "<gold>Founded:</gold> <white><created></white>"
        - "<gray><description></gray>"
    members:
      name: "<aqua><bold>Members</bold></aqua>"
    settings:
      name: "<yellow><bold>Settings</bold></yellow>"
    allies:
      name: "<gold><bold>Allies</bold></gold>"
    bank:
      name: "<gold><bold>Team Bank</bold></gold>"
    home:
      name: "<green><bold>Team Home</bold></green>"
      lore:
        - "<yellow>Left » Teleport</yellow>"
        - "<yellow>Right » Set home</yellow>"
    chat:
      name: "<aqua><bold>Team Chat</bold></aqua>"
      state: "<gray>Status: <state></gray>"
    browse:
      name: "<aqua><bold>Browse Teams</bold></aqua>"
    disband:
      name: "<red><bold>Disband Team</bold></red>"
      lore:
        - "<gray>Permanently disbands your team.</gray>"
        - "<red>» Click</red>"
    leave:
      name: "<red><bold>Leave Team</bold></red>"
  members:
    title: "<dark_gray>Members</dark_gray>"
    entry:
      name: "<white><player></white>"
      lore:
        - "<gold>Rank:</gold> <role>"
        - "<gold>Status:</gold> <gray><status></gray>"
  member-actions:
    title: "<dark_gray><player></dark_gray>"
    promote:
      name: "<green>Promote</green>"
    demote:
      name: "<yellow>Demote</yellow>"
    kick:
      name: "<red>Kick</red>"
      lore:
        - "<gray>Removes this member.</gray>"
    transfer:
      name: "<gold>Transfer ownership</gold>"
      lore:
        - "<gray>Makes this member the owner.</gray>"
        - "<red>You become an officer.</red>"
  settings:
    title: "<dark_gray>Settings</dark_gray>"
    ff:
      name: "<gold><bold>Friendly Fire</bold></gold>"
      lore:
        - "<gray>Status: <state></gray>"
        - "<yellow>» Toggle</yellow>"
    open:
      name: "<gold><bold>Open Team</bold></gold>"
      lore:
        - "<gray>Status: <state></gray>"
        - "<yellow>» Toggle</yellow>"
    color:
      name: "<gold><bold>Change Color</bold></gold>"
    icon:
      name: "<gold><bold>Change Icon</bold></gold>"
    rename:
      name: "<gold><bold>Rename</bold></gold>"
    tag:
      name: "<gold><bold>Change Tag</bold></gold>"
    desc:
      name: "<gold><bold>Description</bold></gold>"
  color:
    title: "<dark_gray>Team Color</dark_gray>"
  icon:
    title: "<dark_gray>Team Icon</dark_gray>"
  browser:
    title: "<dark_gray>All Teams</dark_gray>"
    entry:
      name: "<team>"
      lore:
        - "<gold>Tag:</gold> <tag>"
        - "<gold>Owner:</gold> <white><owner></white>"
        - "<gold>Members:</gold> <white><members>/<members_max></white>"
        - "<gold>Open:</gold> <open>"
        - "<gold>Allies:</gold> <white><allies></white>"
        - "<yellow>» Click for details</yellow>"
  view:
    title: "<dark_gray><team></dark_gray>"
    join:
      name: "<green><bold>Join</bold></green>"
    join-locked:
      name: "<red><bold>Joining locked</bold></red>"
      lore:
        - "<gray>This team is invite-only.</gray>"
    members:
      name: "<aqua><bold>Members</bold></aqua>"
      lore:
        - "<gray><names></gray>"
    ally:
      name: "<gold><bold>Request alliance</bold></gold>"
  invites:
    title: "<dark_gray>Invitations</dark_gray>"
    entry:
      name: "<team>"
      lore:
        - "<gray>Expires in <white><time></white>s</gray>"
        - "<green>Left » Join</green>"
        - "<red>Right » Decline</red>"
  allies:
    title: "<dark_gray>Allies</dark_gray>"
    info:
      name: "<gold><bold>Alliances</bold></gold>"
      lore:
        - "<gold>Allies:</gold> <white><allies>/<max></white>"
    request:
      name: "<aqua>Request from <team></aqua>"
      lore:
        - "<green>Left » Accept</green>"
        - "<red>Right » Decline</red>"
    ally:
      name: "<gold><team></gold>"
      lore:
        - "<red>» Click to remove</red>"
  bank:
    title: "<dark_gray>Team Bank</dark_gray>"
    balance:
      name: "<gold>Balance: <white><amount></white></gold>"
      lore:
        - "<gray>Maximum: <white><max></white></gray>"
    deposit:
      name: "<green>Deposit: <amount></green>"
    deposit-custom:
      name: "<green><bold>Deposit amount</bold></green>"
    withdraw:
      name: "<red>Withdraw: <amount></red>"
    withdraw-custom:
      name: "<red><bold>Withdraw amount</bold></red>"
    withdraw-locked:
      name: "<gray><bold>Withdrawing locked</bold></gray>"
      lore:
        - "<gray>You are not allowed to withdraw money.</gray>"
