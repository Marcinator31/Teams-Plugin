# ============================================================
#  TeamForge - Main configuration
#  All texts/messages can be found in messages.yml
# ============================================================

storage:
  # How often (in minutes) all teams are automatically saved.
  # 0 = autosave disabled (saving still happens on changes and on shutdown).
  autosave-minutes: 5

team:
  name:
    # Minimum and maximum length of the team name
    min-length: 3
    max-length: 16
    # Allowed characters (regex). Default: letters, numbers, underscore
    pattern: "^[A-Za-z0-9_]+$"
  tag:
    # Minimum and maximum length of the team tag (shown in chat / above the head)
    min-length: 2
    max-length: 6
    pattern: "^[A-Za-z0-9]+$"
  # Maximum length of the team description
  description-max-length: 64
  # Forbidden team names (case-insensitive)
  blocked-names:
    - admin
    - mod
    - team
    - server
    - staff
  max-members:
    # Default member limit per team
    default: 8
    # Higher limits via permissions (teams.limit.<number>) - the OWNER must have the permission.
    # Add every number here that can be granted as a permission.
    limits: [12, 16, 24, 32]
  # Are players allowed to change the team color?
  allow-color: true
  # Default color of new teams (names follow Minecraft colors: gray, gold, aqua, red, ...)
  default-color: gray
  # Are teams allowed to be marked as "open" (anyone can join without an invitation)?
  open-teams-allowed: true

friendly-fire:
  # Default value for new teams: can team members hit each other?
  default: false
  # Can teams toggle friendly fire themselves via /team pvp or the GUI?
  # If false, the default value above always applies.
  allow-toggle: true
  # Also protect between allied teams (alliances)?
  protect-allies: true
  # Block harmful splash and lingering potions against team members?
  block-splash-potions: true

chat:
  # Enable team chat (/team chat or /team c)
  team-chat-enabled: true
  # Enable ally chat (/team allychat or /team ac)
  ally-chat-enabled: true
  # Put the team tag in front of names in public chat?
  # Note: with your own chat plugin, better disable this and use the
  # PlaceholderAPI placeholder %teamforge_tag_colored%.
  decorate-public-chat: true

home:
  # Enable the team home system (/team sethome, /team home)
  enabled: true
  # Warmup time in seconds before the teleport (0 = instant)
  warmup-seconds: 3
  # Cooldown in seconds between two teleports
  cooldown-seconds: 30
  # Cancel the teleport if the player moves?
  cancel-on-move: true
  # Cancel the teleport if the player takes damage?
  cancel-on-damage: true
  # /team home is disabled in these worlds
  disabled-worlds:
    - example_world

invites:
  # After how many seconds an invitation expires
  expiry-seconds: 120

allies:
  # Enable the alliance system
  enabled: true
  # Maximum number of alliances per team
  max-allies: 3

bank:
  # Enable the team bank (requires Vault + an economy plugin!)
  enabled: true
  # Maximum balance of the team bank
  max-balance: 1000000
  # Minimum role to withdraw: MEMBER, OFFICER or OWNER
  withdraw-min-role: OFFICER

costs:
  # Costs for actions (requires Vault). 0 = free.
  create: 0
  rename: 0
  set-tag: 0
  set-home: 0

nametags:
  # Show the team tag above the head and in the tab list (scoreboard teams)
  enabled: true
  # Show the tag as a prefix?
  show-tag: true
  # Color player names in the team color?
  color-names: true

broadcasts:
  # Server-wide message when a team is created
  team-create: true
  # Server-wide message when a team is disbanded
  team-disband: true

stats:
  # Count kills/deaths per team (for /team top kills)
  track-kills: true

notifications:
  # Notify team members when a member joins the server
  member-join-server: true

officers:
  # What can officers do (in addition to the owner)?
  can-invite: true
  can-kick: true
  can-set-home: true
  can-edit-settings: true
  can-manage-allies: true
